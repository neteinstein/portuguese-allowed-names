name: Warm Gradle Cache

# release.yml's jobs are triggered by `pull_request` `closed`, and once a PR merges their cache
# scope resolves to the default branch. GitHub only issues a read-only cache token to jobs whose
# triggering event can be raised by a non-collaborator AND whose cache scope is the default
# branch (see https://github.blog/changelog/2026-06-26-read-only-actions-cache-for-untrusted-triggers/),
# so those jobs can restore a Gradle cache but can never save one themselves.
#
# `push` is one of the trigger types that always keeps full read-write cache access. This
# workflow runs on every push to main/master (i.e. every merge) purely to populate/refresh the
# shared Gradle cache under a well-known key, so release.yml's restore-only steps have a real,
# up-to-date cache to hit instead of always missing.
on:
  push:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  warm-cache:
    name: Warm Gradle Cache
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: 'temurin'
          java-version: '17'
          # Not setup-java's own `cache: gradle`: that uses an internal, undocumented key
          # format, and release.yml's restore-only steps need a key they can rely on. The
          # explicit `actions/cache` step below uses the same key/paths as those restore steps.
          # The `cache` input is omitted entirely, not set to `false` - setup-java treats that
          # as a literal package-manager name and errors: "unknown package manager specified: false".

      - name: Cache Gradle
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Same tasks release.yml's "Run Tests" job runs: resolving their dependencies and
      # compiling the release variant is what actually populates ~/.gradle/caches.
      - name: Warm cache
        run: ./gradlew lintRelease testReleaseUnitTest
