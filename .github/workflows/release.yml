name: Release

# Fires when a pull request targeting main/master is closed, then the `if: merged == true`
# guard on each job ensures the release only actually runs when the PR was merged (not when
# it was closed unmerged). This is more precise than a plain `push` trigger, which would also
# fire on direct pushes that bypass PR review.
on:
  pull_request:
    types: [ closed ]
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  # A release publishes artifacts and creates a GitHub release, so a run should never be
  # cancelled mid-flight by another trigger.
  cancel-in-progress: false

permissions:
  contents: write
  # Note on Gradle caching: this workflow is triggered by `pull_request` `closed`, and once a
  # PR merges its cache scope resolves to the default branch. Per GitHub's read-only-cache
  # policy for untrusted-triggerable events scoped to the default branch
  # (https://github.blog/changelog/2026-06-26-read-only-actions-cache-for-untrusted-triggers/),
  # jobs here only ever get a read-only cache token - no `permissions:` entry can grant a save
  # here, so the jobs below deliberately use restore-only `actions/cache/restore` steps instead
  # of actions/setup-java's `cache: gradle` (which would keep attempting - and failing - a save
  # and logging "cache write denied: token has no writable scopes" every run). The actual cache
  # is populated by the `push`-triggered cache-warm.yml workflow, which keeps full read-write
  # access and saves the entries these jobs restore.

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout code
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          # Check out the actual commit that landed on the base branch. The default
          # pull_request ref (refs/pull/<n>/merge) is an ephemeral preview merge and isn't
          # guaranteed to still exist/be accurate once the PR is closed.
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: 'temurin'
          java-version: '17'
          # Restore-only (see the `permissions:` comment above): this job's token can't save a
          # cache, so letting setup-java's own `cache: gradle` try would just fail every run.
          # The `cache` input is omitted entirely rather than set to `false` - setup-java only
          # accepts a package-manager name (gradle/maven/sbt) here, so `cache: false` itself
          # errors with "unknown package manager specified: false".

      - name: Restore Gradle cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lintRelease

      - name: Run Unit Tests
        run: ./gradlew testReleaseUnitTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results
          path: app/build/test-results/

  build-release:
    name: Build Signed Release
    runs-on: ubuntu-latest
    needs: test
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout code
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      # Auto-increments the PATCH component of versionName (MAJOR.MINOR.PATCH) on every merge
      # to main/master, so releases no longer depend on a manual "bump version" commit in the
      # PR. MAJOR/MINOR are still bumped by hand when needed - this only ever touches PATCH.
      # Runs before the build steps so the artifacts built and released below already carry
      # the new version. Pushed straight to the base branch (no PR) since master isn't branch-
      # protected in this repo; contents: write (declared above) is what authorizes the push.
      - name: Bump patch version
        run: |
          CURRENT_VERSION=$(grep -E '^[[:space:]]*versionName = "' app/build.gradle.kts | head -1 | sed -E 's/.*versionName = "([^"]+)".*/\1/')

          if [[ ! "$CURRENT_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::versionName '$CURRENT_VERSION' in app/build.gradle.kts is not in MAJOR.MINOR.PATCH format"
            exit 1
          fi

          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "Bumping version: $CURRENT_VERSION -> $NEW_VERSION"

          sed -i "s/versionName = \"$CURRENT_VERSION\"/versionName = \"$NEW_VERSION\"/" app/build.gradle.kts

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push origin HEAD:${{ github.event.pull_request.base.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: 'temurin'
          java-version: '17'
          # Restore-only - see the `permissions:` comment near the top of this file. The
          # `cache` input is omitted (not set to `false` - setup-java rejects that with
          # "unknown package manager specified: false"; it only accepts a package-manager name).

      - name: Restore Gradle cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ENCODED_KEYSTORE" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set. A signed release requires the KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS and KEY_PASSWORD secrets (see .github/CI_CD_SETUP.md)."
            exit 1
          fi
          echo "$ENCODED_KEYSTORE" | base64 -di > app/release-keystore.jks

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -PversionCode=${{ github.run_number }} \
            -Pandroid.injected.signing.store.file="$(pwd)/app/release-keystore.jks" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Build Release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -PversionCode=${{ github.run_number }} \
            -Pandroid.injected.signing.store.file="$(pwd)/app/release-keystore.jks" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Verify APK signature
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          BUILD_TOOLS_DIR=$(find "$SDK_ROOT/build-tools" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -1)
          "$BUILD_TOOLS_DIR/apksigner" verify --print-certs app/build/outputs/apk/release/app-release.apk

      - name: Generate Release Notes
        id: release_notes
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          # --invert-grep on the auto "chore: bump version to ..." commit (added by the "Bump
          # patch version" step above) keeps that noise out of the generated release notes.
          if [ -z "$LATEST_TAG" ]; then
            # No previous tag, use all commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges --invert-grep --grep="^chore: bump version to ")
          else
            # Get commits since last tag
            COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges --invert-grep --grep="^chore: bump version to ")
          fi
          
          # Generate release notes
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "## What's Changed" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LATEST_TAG}...HEAD" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
      - name: Get version from gradle
        id: version
        run: |
          VERSION_NAME=$(grep "versionName" app/build.gradle.kts | awk -F'"' '{print $2}' | head -1)
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          # The actual versionCode: it's not a literal in build.gradle.kts anymore (see the
          # -PversionCode passed to assembleRelease/bundleRelease above), so the run number
          # *is* the value that was just built into these artifacts, not something to re-derive.
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_OUTPUT
          # Underscore-separated version (e.g. 2.2.4 -> 2_2_4) used for the public asset file
          # names below, per the AllowedPortugueseNames_vX_X_X.apk/.aab naming convention.
          echo "VERSION_UNDERSCORE=${VERSION_NAME//./_}" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Piped through env vars (instead of interpolating ${{ }} directly into the script)
          # so that commit-message content in RELEASE_NOTES is treated as data, not shell
          # syntax — avoids a script-injection hole from untrusted commit/PR text.
          VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
          VERSION_UNDERSCORE: ${{ steps.version.outputs.VERSION_UNDERSCORE }}
          RELEASE_NOTES: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
        run: |
          gh release create "v$VERSION_NAME" \
            "app/build/outputs/apk/release/app-release.apk#AllowedPortugueseNames_v${VERSION_UNDERSCORE}.apk" \
            "app/build/outputs/bundle/release/app-release.aab#AllowedPortugueseNames_v${VERSION_UNDERSCORE}.aab" \
            --title "Release v$VERSION_NAME" \
            --notes "$RELEASE_NOTES"

      - name: Upload to Google Play (Internal Track)
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
          packageName: org.neteinstein.pickaname
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          tracks: internal
          status: completed
          # This Play Console account has managed publishing (or an equivalent review
          # requirement) turned on, so the API refuses to auto-submit an edit for review and
          # fails the commit with "Changes cannot be sent for review automatically. Please set
          # the query parameter changesNotSentForReview to true.". Setting this to true commits
          # the upload successfully; a maintainer still needs to open Play Console afterwards
          # and hit "Send for review" (or "Publish") to make the build live on the internal
          # track - see CI_CD_SETUP.md.
          changesNotSentForReview: true
          # No whatsNewDirectory here: distribution/whatsnew was deliberately deleted (no
          # per-locale release notes are maintained), and pointing at a missing directory
          # makes this action fail with ENOENT. The Play Store release still gets the
          # GitHub release notes generated above.
