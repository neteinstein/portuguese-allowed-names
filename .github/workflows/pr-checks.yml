name: PR Checks

on:
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Lint and Unit Tests run as two legs of the same matrix job so they execute in parallel, and
  # so that "fail-fast" (on by default, kept explicit here for clarity) cancels the other leg the
  # moment either one fails, instead of burning CI minutes on a PR that's already broken.
  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: Lint Code
            gradle-task: lintDebug
          - name: Unit Tests
            gradle-task: testDebugUnitTest

    steps:
      - name: Checkout code
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        
      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Run ${{ matrix.name }}
        run: ./gradlew ${{ matrix.gradle-task }}
        
      - name: Upload lint results
        if: always() && matrix.name == 'Lint Code'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.html
          
      - name: Upload unit test results
        if: always() && matrix.name == 'Unit Tests'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unit-test-results
          path: app/build/test-results/testDebugUnitTest/
          
      - name: Upload unit test reports
        if: always() && matrix.name == 'Unit Tests'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unit-test-reports
          path: app/build/reports/tests/testDebugUnitTest/
  
  instrumented-tests:
    name: Instrumented Tests
    # ubuntu-latest (with KVM) rather than macos-latest: GitHub's macOS runners are now
    # Apple Silicon (ARM64) and cannot boot the x86_64 emulator image, which fails every run
    # with "device not found". Linux hardware-accelerated emulators are also the officially
    # recommended, faster, cheaper option — see
    # https://github.com/ReactiveCircus/android-emulator-runner#running-hardware-accelerated-emulators-on-linux-runners
    runs-on: ubuntu-latest
    needs: checks
    
    steps:
      - name: Checkout code
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        
      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
        
      - name: Run Instrumented Tests
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          script: ./gradlew connectedDebugAndroidTest
          
      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: instrumented-test-results
          path: app/build/outputs/androidTest-results/
          
      - name: Upload instrumented test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: instrumented-test-reports
          path: app/build/reports/androidTests/
  
  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: checks
    
    steps:
      - name: Checkout code
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        
      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build Debug APK
        run: ./gradlew assembleDebug
        
      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
